<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>

                    "border": "#E5E4DE",
                    "tertiary-fixed": "#ffddb5",

                    "amber": "#E8A33D",

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            vertical-align: middle;
        }
        body {
            background-color: #FAFAF8; /* Paper background from guidelines */
        }
        .login-card {
            box-shadow: 0 0 0 0 rgba(0, 0, 0, 0);
            transition: box-shadow 0.3s ease, transform 0.15s ease;
        }
        .login-card:hover {
            box-shadow: 0 4px 20px -2px rgba(0, 0, 0, 0.05);
        }
        input:focus {
            outline: 2px solid #1FA391 !important; /* Signal Teal focus */
            outline-offset: 2px;
            border-color: transparent !important;
        }
    </style>
</head>
<body class="font-body text-ink flex items-center justify-center min-h-screen p-md">
<main class="w-full max-w-[440px]">
<!-- Brand Logo Anchor -->
<div class="flex justify-center mb-xl">
<div class="flex items-center gap-xs">
<span class="material-symbols-outlined text-signal-teal text-[32px]">smart_toy</span>
<span class="font-display-md text-display-md text-ink">BotSimple</span>
</div>
</div>
<!-- Login Card -->
<div class="login-card bg-paper border border-border rounded-xl p-lg md:p-xl">
<header class="mb-lg text-center">
<h1 class="font-display-md text-display-md text-ink mb-xs">Welcome back</h1>
<p class="font-body text-body text-secondary">Manage your business AI helpers</p>
</header>
<form action="#" class="space-y-md" method="POST">
<!-- Email Field -->
<div class="space-y-xs">
<label class="block font-body text-body-sm text-ink font-medium" for="email">Email</label>
<input class="w-full h-[48px] px-sm bg-paper border border-border rounded-xl font-body text-body focus:ring-0 transition-all placeholder:text-outline/50" id="email" name="email" placeholder="name@business.com" required="" type="email"/>
</div>
<!-- Password Field -->
<div class="space-y-xs">
<div class="flex justify-between items-center">
<label class="block font-body text-body-sm text-ink font-medium" for="password">Password</label>
<a class="font-caption text-caption text-signal-teal hover:underline transition-all" href="#">Forgot password?</a>
</div>
<div class="relative">
<input class="w-full h-[48px] px-sm bg-paper border border-border rounded-xl font-body text-body focus:ring-0 transition-all placeholder:text-outline/50" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute right-sm top-1/2 -translate-y-1/2 text-outline hover:text-ink transition-colors" onclick="togglePassword()" type="button">
<span class="material-symbols-outlined" id="password-toggle-icon">visibility</span>
</button>
</div>
</div>
<!-- Primary Action -->
<button class="w-full h-[48px] bg-signal-teal text-paper font-body text-body font-semibold rounded-xl hover:bg-teal-dark active:scale-[0.98] transition-all flex items-center justify-center gap-xs" type="submit">
                    Sign In
                </button>
</form>
<!-- Divider -->
<div class="relative my-lg">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-border"></div>
</div>
<div class="relative flex justify-center text-caption font-caption uppercase tracking-wider">
<span class="bg-paper px-sm text-slate">or</span>
</div>
</div>
<!-- Social Action -->
<button class="w-full h-[48px] bg-transparent border border-border text-ink font-body text-body font-medium rounded-xl hover:bg-soft-mint active:scale-[0.98] transition-all flex items-center justify-center gap-sm group" type="button">
<img alt="Google" class="w-5 h-5 group-hover:scale-110 transition-transform" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCRRbcyr_7aGx8l_xdoyKIHT-spCkmY6vXsT74zvnT5nrvOHYe8FB4x7zWUkJQa1l3AA9EfJ-D4S0PHMXL3FUGG-kFrUwVu9rUS12yPXtbvRUQM6XXHKQjB9mk7KQ_VGAHuctxOg68WovJP3f4Evk0fltlVzX6GZFisPhdYVkq5t9w0zO4h3XbTNd7Ho3E6RKFlod2ZmqxKofMPfv5E9ImMbB4xHIKiumulVO7C13mJQ2H1dxxlGrwqIw"/>
                Continue with Google
            </button>
</div>
<!-- Footer Link -->
<footer class="mt-lg text-center">
<p class="font-body text-body-sm text-secondary">
                Don't have an account? 
                <a class="text-signal-teal font-semibold hover:underline transition-all" href="#">Register</a>
</p>
</footer>
</main>
<!-- Decorative Background Elements -->
<div class="fixed inset-0 -z-10 overflow-hidden pointer-events-none">
<div class="absolute -top-1/4 -right-1/4 w-[600px] h-[600px] bg-soft-mint/30 rounded-full blur-3xl"></div>
<div class="absolute -bottom-1/4 -left-1/4 w-[600px] h-[600px] bg-primary-fixed/20 rounded-full blur-3xl"></div>
</div>
<script>
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const toggleIcon = document.getElementById('password-toggle-icon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.textContent = 'visibility_off';
            } else {
                passwordInput.type = 'password';
                toggleIcon.textContent = 'visibility';
            }
        }

        // Add a subtle tactile feedback on click for buttons
        document.querySelectorAll('button').forEach(button => {
            button.addEventListener('mousedown', () => {
                button.style.transform = 'scale(0.97)';
            });
            button.addEventListener('mouseup', () => {
                button.style.transform = '';
            });
            button.addEventListener('mouseleave', () => {
                button.style.transform = '';
            });
        });
    </script>
</body></html>

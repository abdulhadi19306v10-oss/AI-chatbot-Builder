<style>
        body {
            background-color: #FAFAF8; /* Paper background */
            -webkit-font-smoothing: antialiased;

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;

        }

            outline: 2px solid #1FA391;
            outline-offset: -1px;
            border-color: transparent;
        }
        .custom-shadow-hover:hover {
            box-shadow: 0 4px 20px -2px rgba(0, 0, 0, 0.05);
        }

<body class="min-h-screen flex flex-col font-body text-ink">
<!-- Header / Branding Navigation (Suppressed per transactional rule, but kept minimal top bar for identity) -->
<header class="w-full h-16 flex items-center justify-between px-lg max-w-max-width mx-auto">
<div class="flex items-center gap-xs">
<span class="material-symbols-outlined text-signal-teal text-[28px]" data-icon="smart_toy">smart_toy</span>
<span class="font-display-md text-display-md text-primary tracking-tight">BotSimple</span>
</div>
</header>
<main class="flex-grow flex items-center justify-center px-md py-xl">
<!-- Registration Card -->
<div class="w-full max-w-[440px] bg-paper border border-border rounded-xl p-lg custom-shadow-hover transition-all duration-300">
<div class="mb-xl text-center">
<h1 class="font-display-md text-display-md text-ink mb-xs">Get started</h1>
<p class="font-body text-slate">Build your first AI assistant in seconds.</p>
</div>
<form class="space-y-md" onsubmit="event.preventDefault();">
<!-- Full Name Field -->
<div class="space-y-xs">
<label class="font-caption text-ink uppercase tracking-wider opacity-70" for="name">Full Name</label>
<input class="w-full bg-paper border border-border rounded-xl p-md font-body text-ink form-input transition-all placeholder:text-slate/50" id="name" placeholder="Jane Doe" type="text"/>
</div>
<!-- Work Email Field -->
<div class="space-y-xs">
<label class="font-caption text-ink uppercase tracking-wider opacity-70" for="email">Work Email</label>
<input class="w-full bg-paper border border-border rounded-xl p-md font-body text-ink form-input transition-all placeholder:text-slate/50" id="email" placeholder="jane@company.com" type="email"/>
</div>
<!-- Password Field -->
<div class="space-y-xs relative">
<label class="font-caption text-ink uppercase tracking-wider opacity-70" for="password">Password</label>
<div class="relative">
<input class="w-full bg-paper border border-border rounded-xl p-md font-body text-ink form-input transition-all placeholder:text-slate/50" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-slate hover:text-ink transition-colors" type="button">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Primary Action -->
<button class="w-full bg-signal-teal text-paper font-heading text-body rounded-xl h-[48px] px-lg mt-sm hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-xs" type="submit">
                    Create Account
                </button>
</form>
<!-- Divider -->
<div class="relative my-xl flex items-center justify-center">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-border"></div>
</div>
<span class="relative bg-paper px-md font-caption text-slate">or</span>
</div>
<!-- Social Provider -->
<button class="w-full bg-transparent border border-border text-ink font-body text-body rounded-xl h-[48px] px-lg hover:bg-soft-mint transition-colors duration-150 flex items-center justify-center gap-sm active:scale-[0.98]">
<!-- Placeholder for Google Logo -->
<div class="w-5 h-5 flex items-center justify-center overflow-hidden">
<img class="w-full h-full object-contain" data-alt="A clean, professional vector logo of the Google 'G' icon, rendered with high-fidelity colors. The style is minimalist and corporate, fitting perfectly into a modern white and light gray user interface. The lighting is flat and even, characteristic of contemporary digital branding assets. This asset maintains the brand's iconic primary colors against a pristine background." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBXSwjnxiEOaSFxV2NGuAxH71yy6RoxmDRxd-LuB5KllISpG-29ZDnmn5qkOuSnQK56w1wzCOOdsgAFieseHEiT46_94hRKDoE-tGQtrY_vnaKP8dJtZzKxzCYu7818HxOFihDSybgVNvdOcOuDO8aj9QTDzzs6Jh7V-6KGONxVVqx2f5IwiaYmkCj-sm1_xthvp2lZ2584-MJAd6Oy_XJ3c9G7OwjjRVNKbUlio9tD7IdClc2N4CqDWg"/>
</div>
                Continue with Google
            </button>
<!-- Bottom Link -->
<div class="mt-xl text-center">
<p class="font-body-sm text-slate">
                    Already have an account? 
                    <a class="text-primary font-semibold hover:underline decoration-2 underline-offset-4" href="#">Log in</a>
</p>
</div>
</div>
</main>
<!-- Simple Footer for Transactional Page -->
<footer class="w-full py-lg px-md">
<div class="max-w-max-width mx-auto flex flex-col md:flex-row justify-between items-center gap-md">
<p class="font-caption text-slate">© 2024 BotSimple AI. All rights reserved.</p>
<div class="flex gap-lg">
<a class="font-caption text-slate hover:text-primary transition-colors" href="#">Terms</a>
<a class="font-caption text-slate hover:text-primary transition-colors" href="#">Privacy</a>
<a class="font-caption text-slate hover:text-primary transition-colors" href="#">Contact</a>
</div>
</div>
</footer>
<!-- Subtle Background Micro-Interaction -->
<div class="fixed inset-0 pointer-events-none -z-10 overflow-hidden">
<div class="absolute w-96 h-96 bg-soft-mint rounded-full blur-[120px] opacity-30 transition-transform duration-1000 ease-out" id="blob"></div>
</div>
<script>
        // Soft mouse following background effect
        const blob = document.getElementById('blob');
        document.addEventListener('mousemove', (e) => {
            const x = e.clientX - 192;
            const y = e.clientY - 192;
            blob.style.transform = `translate(${x}px, ${y}px)`;
        });

        // Form focus interaction enhancement
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.querySelector('label')?.classList.add('text-signal-teal', 'opacity-100');
            });
            input.addEventListener('blur', () => {
                input.parentElement.querySelector('label')?.classList.remove('text-signal-teal', 'opacity-100');
            });
        });
    </script>

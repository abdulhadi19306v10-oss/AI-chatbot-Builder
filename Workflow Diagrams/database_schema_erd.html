<h2 class="sr-only">Entity relationship diagram of the chatbot platform database: plans, businesses, bots, documents, chunks, visitors, conversations, messages, leads, and usage_daily tables with their foreign key relationships</h2>
<style>
#erd svg.erDiagram .divider path { stroke-opacity: 0.5; }
#erd svg.erDiagram .row-rect-odd path,
#erd svg.erDiagram .row-rect-odd rect,
#erd svg.erDiagram .row-rect-even path,
#erd svg.erDiagram .row-rect-even rect { stroke: none !important; }
</style>
<div id="erd"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
  },
});
const src = `erDiagram
  PLANS ||--o{ BUSINESSES : subscribes
  BUSINESSES ||--o{ BOTS : owns
  BOTS ||--o{ DOCUMENTS : trains_on
  DOCUMENTS ||--o{ CHUNKS : splits_into
  BOTS ||--o{ VISITORS : has
  BOTS ||--o{ CONVERSATIONS : handles
  VISITORS ||--o{ CONVERSATIONS : starts
  CONVERSATIONS ||--o{ MESSAGES : contains
  CONVERSATIONS ||--o{ LEADS : may_produce
  BOTS ||--o{ LEADS : receives
  BOTS ||--o{ USAGE_DAILY : tracks
  VISITORS ||--o{ USAGE_DAILY : tracks

  PLANS {
    uuid id PK
    string name
    int max_bots
    int daily_message_limit
    decimal price
  }
  BUSINESSES {
    uuid id PK
    uuid plan_id FK
    string name
    string email
    timestamp cancelled_at
  }
  BOTS {
    uuid id PK
    uuid business_id FK
    string name
    text personality_prompt
    string language_mode
    string status
  }
  DOCUMENTS {
    uuid id PK
    uuid bot_id FK
    string filename
    string file_type
    string status
  }
  CHUNKS {
    uuid id PK
    uuid document_id FK
    uuid bot_id FK
    text content
    vector embedding
  }
  VISITORS {
    uuid id PK
    uuid bot_id FK
    string fingerprint_hash
    timestamp last_seen
  }
  CONVERSATIONS {
    uuid id PK
    uuid bot_id FK
    uuid visitor_id FK
    boolean was_fallback
  }
  MESSAGES {
    uuid id PK
    uuid conversation_id FK
    string role
    text content
    float confidence_score
  }
  LEADS {
    uuid id PK
    uuid bot_id FK
    uuid conversation_id FK
    string name
    string email
  }
  USAGE_DAILY {
    uuid id PK
    uuid bot_id FK
    uuid visitor_id FK
    date date
    int message_count
  }`;
const { svg } = await mermaid.render('erd-svg', src);
document.getElementById('erd').innerHTML = svg;

document.querySelectorAll('#erd svg.erDiagram .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});

document.querySelectorAll('#erd svg.erDiagram .row-rect-odd path, #erd svg.erDiagram .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
